<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizyka: Hydrostatyka (Master Class)</title>
    <style>
        /* STYL GŁÓWNY - FIZYCZNY FIOLET */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f3e5f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 10px; color: #4a148c; overflow-y: auto;}
        #container { background-color: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(74, 20, 140, 0.2); width: 100%; max-width: 800px; border: 4px solid #ab47bc; margin-bottom: 50px;}
        h1 { margin: 10px 0 20px 0; font-size: 28px; color: #7b1fa2; text-align: center; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; margin-top: 20px; }
        .btn-menu { border: none; padding: 25px; font-size: 20px; font-weight: bold; border-radius: 20px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: flex-start; box-shadow: 0 6px 0 rgba(0,0,0,0.1); color: white; position: relative; overflow: hidden; }
        .btn-menu:active { transform: translateY(4px); box-shadow: none; }
        .btn-menu .icon { font-size: 35px; margin-right: 15px; }
        
        .bg-theory { background: linear-gradient(45deg, #ab47bc, #7b1fa2); }
        .bg-test { background: linear-gradient(45deg, #ef5350, #c62828); }

        .hidden { display: none !important; }
        .section-view { width: 100%; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        /* TEORIA */
        .theory-card { background: #fff; border-left: 6px solid #ab47bc; padding: 20px; margin-bottom: 25px; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); text-align: left; }
        .theory-card h3 { margin-top: 0; color: #6a1b9a; border-bottom: 2px solid #f3e5f5; padding-bottom: 8px;}
        .theory-img { width: 100%; max-width: 400px; display: block; margin: 15px auto; border-radius: 10px; border: 1px solid #ddd; }
        
        .formula-box { background: #f3e5f5; padding: 15px; border-radius: 8px; font-family: monospace; font-weight: bold; text-align: center; font-size: 22px; margin: 15px 0; border: 2px dashed #ab47bc; color: #4a148c; letter-spacing: 2px;}
        .btn-audio { background-color: #ba68c8; color: white; border: none; padding: 12px 20px; border-radius: 20px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; box-shadow: 0 4px 0 #8e24aa; }
        .btn-audio:active { transform: translateY(2px); box-shadow: none; }

        /* QUIZ */
        .quiz-question { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: left; line-height: 1.4;}
        .quiz-options { display: grid; gap: 12px; }
        .quiz-btn { background: #f3e5f5; border: 2px solid #ce93d8; padding: 18px; border-radius: 15px; font-size: 16px; cursor: pointer; text-align: left; color: #4a148c; font-weight: 500; transition: background 0.2s;}
        .quiz-btn:hover { background: #e1bee7; }
        .quiz-btn.correct { background: #66bb6a !important; color: white !important; border-color: #2e7d32 !important; }
        .quiz-btn.wrong { background: #ef5350 !important; color: white !important; border-color: #c62828 !important; }
        
        .feedback-box { background: #f5f5f5; padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 16px; display: none; border-left: 5px solid #ccc;}

        .nav-btn { margin-top: 25px; padding: 15px 25px; background: #555; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold;}
        .back-btn { background: #eee; color: #333; margin-bottom: 20px; padding: 10px 20px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; display: inline-block;}
        
        .progress-container { width: 100%; background-color: #e0e0e0; border-radius: 10px; margin-bottom: 25px; height: 12px; overflow: hidden; }
        .progress-bar { height: 100%; background-color: #ab47bc; width: 0%; transition: width 0.4s ease; }
    </style>
</head>
<body>

<div id="container">
    
    <div id="menu-screen" class="section-view">
        <h1>⚛️ Fizyka: Hydrostatyka (Master Class)</h1>
        
        <div class="menu-grid">
            <button class="btn-menu bg-theory" onclick="showSection('theory')">
                <div class="icon">📚</div>
                <div>Wykłady i Wzory<br><small>Dokładne omówienie teorii</small></div>
            </button>

            <button class="btn-menu bg-test" onclick="startQuiz()">
                <div class="icon">📝</div>
                <div>TEST Z UZASADNIENIAMI<br><small>Ćwiczenia z wyjaśnieniami</small></div>
            </button>
        </div>

        <button class="nav-btn" onclick="window.history.back()" style="margin-top:40px;">🏠 Wróć do Pulpitu</button>
    </div>

    <div id="theory-screen" class="section-view hidden">
        <button class="back-btn" onclick="showSection('menu')">⬅ Wróć do Menu</button>
        <h2 style="text-align: center; color: #7b1fa2;">Pełne Wykłady (Słuchaj uważnie)</h2>

        <div class="theory-card">
            <h3>1. Parcie to SIŁA, Ciśnienie to WYNIK</h3>
            <img src="cisnienie_stopy.jpg" class="theory-img" onerror="this.style.display='none'" alt="Nacisk stóp">
            <div class="formula-box">p = F / S</div>
            <button class="btn-audio" onclick="speak('Lekcja pierwsza. Zrozum różnicę między parciem a ciśnieniem. Parcie, oznaczane we wzorze literą F, to siła nacisku. Jak każdą siłę w fizyce, mierzymy ją w Niutonach. Z kolei ciśnienie, oznaczane literą p, mówi o tym, jak ta siła rozkłada się na daną powierzchnię S. Ciśnienie mierzymy w Paskalach. Największe ciśnienie na podłogę wywierasz, gdy stoisz na jednej nodze, ponieważ pole powierzchni jest wtedy najmniejsze. Kiedy leżysz, ciśnienie jest bardzo małe.')">
                📢 Odtwórz Wykład 1 (Parcie i Ciśnienie)
            </button>
        </div>

        <div class="theory-card">
            <h3>2. Od czego zależy Ciśnienie Hydrostatyczne?</h3>
            <img src="paradoks.jpg" class="theory-img" onerror="this.style.display='none'" alt="Paradoks hydrostatyczny">
            <div class="formula-box">p = d · g · h</div>
            <button class="btn-audio" onclick="speak('Lekcja druga. Niezwykle ważny wzór p = d razy g razy h. Ciśnienie wywierane przez ciecz jest wprost proporcjonalne do trzech rzeczy: gęstości cieczy d, przyspieszenia ziemskiego g oraz głębokości h. Zapamiętaj: ciśnienie hydrostatyczne zdecydowanie zależy od wartości przyspieszenia ziemskiego! A od czego nie zależy? Tutaj wkracza paradoks hydrostatyczny: ciśnienie w ogóle nie zależy od kształtu naczynia ani od materiału, z którego zrobiono to naczynie.')">
                📢 Odtwórz Wykład 2 (Zależności hydrostatyczne)
            </button>
        </div>

        <div class="theory-card">
            <h3>3. Gazy, Pascal i Barometr</h3>
            <img src="prawo_pascala.jpg" class="theory-img" onerror="this.style.display='none'" alt="Prawo Pascala">
            <button class="btn-audio" onclick="speak('Lekcja trzecia. Prawo Pascala mówi jasno: ciśnienie w gazach i cieczach przekazywane jest we wszystkich kierunkach jednakowo. Na każdą ściankę napiera z taką samą siłą. Drugą rzeczą, o której musisz pamiętać, jest ciśnienie atmosferyczne, czyli nacisk powietrza. Przyrządem służącym do sprawdzania pomiaru ciśnienia atmosferycznego jest barometr.')">
                📢 Odtwórz Wykład 3 (Prawo Pascala i Barometr)
            </button>
            <img src="barometr.jpg" class="theory-img" onerror="this.style.display='none'" alt="Barometr">
        </div>
    </div>

    <div id="test-screen" class="section-view hidden">
        <button class="back-btn" onclick="showSection('menu')">⬅ Przerwij</button>
        <div style="display:flex; justify-content:space-between; color:#888; margin-bottom:10px; font-weight:bold;">
            <span>Test Hydrostatyka</span>
            <span>Pytanie <span id="q-number">1</span> / 9</span>
        </div>
        
        <div class="progress-container">
            <div id="quiz-progress" class="progress-bar"></div>
        </div>
        
        <div class="theory-card" style="border-left-color: #c62828; padding: 25px;">
            <p id="q-text" class="quiz-question">...</p>
        </div>

        <div id="q-options" class="quiz-options"></div>
        
        <div id="q-feedback" class="feedback-box"></div>
        
        <button id="next-btn" class="nav-btn hidden" onclick="nextQuestion()" style="background: #c62828;">Rozumiem, Następne Pytanie ➡</button>
    </div>

    <div id="end-screen" class="section-view hidden">
        <h2 style="text-align: center; font-size: 40px; margin-bottom: 5px;">🎉</h2>
        <h2 style="text-align: center; color: #7b1fa2; font-size: 30px;">Zakończono Trening!</h2>
        <h3 id="final-score" style="text-align: center; color: #4a148c; font-size: 24px; background: #f3e5f5; padding: 20px; border-radius: 15px;">Wynik: 0/0</h3>
        <button class="nav-btn" onclick="showSection('menu')">Wróć do Menu Głównego</button>
    </div>

</div>

<script>
    function showSection(id) {
        window.speechSynthesis.cancel();
        document.querySelectorAll('.section-view').forEach(el => el.classList.add('hidden'));
        if(id === 'menu') document.getElementById('menu-screen').classList.remove('hidden');
        if(id === 'theory') document.getElementById('theory-screen').classList.remove('hidden');
        if(id === 'none') return; 
        window.scrollTo(0,0);
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'pl-PL';
        window.speechSynthesis.speak(u);
    }

    // --- BAZA PYTAŃ ---
    const questions = [
        {
            q: "Kiedy wywierasz NAJWIĘKSZE ciśnienie na podłogę?",
            opts: ["Leżąc płasko na brzuchu.", "Stojąc na dwóch nogach.", "Stojąc na jednej nodze.", "Siedząc po turecku."],
            ans: 2,
            info: "Wzór to p = F/S. Siła (Twój ciężar) jest taka sama, ale stojąc na jednej nodze pole powierzchni (S) jest najmniejsze. Dzieląc przez najmniejszą powierzchnię, otrzymujemy największe ciśnienie."
        },
        {
            q: "Jednostką CIŚNIENIA jest Paskal (Pa). A jaka jest jednostka SIŁY PARCIA?",
            opts: ["Również Paskal (Pa)", "Niuton (N)", "Kilogram (kg)", "Dżul (J)"],
            ans: 1,
            info: "Parcie to fizyczna SIŁA nacisku. Każdą siłę w fizyce mierzymy w Niutonach (N)."
        },
        {
            q: "Czy ciśnienie hydrostatyczne na dnie naczynia ZALEŻY od kształtu tego naczynia?",
            opts: ["Tak, w szerokim naczyniu jest zawsze większe.", "Tak, ale tylko w naczyniach zwężających się ku górze.", "Nie, w ogóle nie zależy od kształtu naczynia."],
            ans: 2,
            info: "To zjawisko nazywamy paradoksem hydrostatycznym. Woda na danej głębokości naciska na dno z taką samą siłą, niezależnie od tego, czy naczynie jest cienką rurką, czy szerokim dzbankiem."
        },
        {
            q: "Czy ciśnienie hydrostatyczne wywierane na dno zależy od MATERIAŁU, z jakiego zbudowano naczynie (np. szkło czy plastik)?",
            opts: ["Tak, szkło stawia większy opór.", "Nie, rodzaj substancji naczynia nie ma znaczenia.", "Zależy, ale tylko w słonej wodzie."],
            ans: 1,
            info: "Materiał, z którego wykonano ściany naczynia (plastik, beton, metal, szkło), nie zmienia fizycznych właściwości cieczy, która w nim jest. Ciśnienie zależy od samej cieczy, a nie od opakowania."
        },
        {
            q: "Od jakich trzech zmiennych (do których jest wprost proporcjonalne) ZALEŻY ciśnienie hydrostatyczne?",
            opts: ["Od objętości cieczy, temperatury i masy naczynia.", "Od gęstości cieczy, wysokości słupa cieczy i przyspieszenia ziemskiego.", "Od kształtu naczynia, grubości ścian i pola powierzchni dna."],
            ans: 1,
            info: "Spójrz na wzór: p = d · g · h. 'd' to gęstość cieczy, 'g' to przyspieszenie ziemskie, a 'h' to wysokość (głębokość)."
        },
        {
            q: "Pytanie podchwytliwe! Czy ciśnienie hydrostatyczne ZALEŻY od wartości przyspieszenia ziemskiego?",
            opts: ["Nie, przyspieszenie ziemskie wpływa tylko na spadające przedmioty.", "Fizyka jeszcze tego nie udowodniła.", "Tak, zależy od wartości przyspieszenia ziemskiego."],
            ans: 2,
            info: "Oczywiście, że tak! Litera 'g' we wzorze (p = d·g·h) to właśnie przyspieszenie ziemskie (wynoszące około 10 m/s² na Ziemi). Na Księżycu ciśnienie wody w basenie byłoby mniejsze!"
        },
        {
            q: "W jakich kierunkach jest przekazywane ciśnienie w gazach (oraz cieczach)?",
            opts: ["Tylko pionowo w dół, zgodnie z grawitacją.", "We wszystkich kierunkach tak samo (jednakowo).", "Tylko w kierunku poziomym na ściany naczynia."],
            ans: 1,
            info: "Zgodnie z Prawem Pascala, jeśli napompujesz balon, ciśnienie powietrza w środku naciska na jego ścianki od wewnątrz we wszystkich kierunkach dokładnie z taką samą siłą."
        },
        {
            q: "Jakiego przyrządu użyjesz do sprawdzenia pomiaru ciśnienia ATMOSFERYCZNEGO?",
            opts: ["Siłomierza", "Termometru", "Barometru", "Higrometru"],
            ans: 2,
            info: "Do pomiaru ciśnienia atmosferycznego służy Barometr (od greckiego 'baros' oznaczającego ciężar, bo mierzy ciężar powietrza nad nami). Siłomierz z kolei mierzy siłę (np. parcie)."
        }
    ];

    let qIndex = 0;
    let score = 0;

    function startQuiz() {
        showSection('none'); 
        document.getElementById('test-screen').classList.remove('hidden');
        qIndex = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        if(qIndex >= questions.length) {
            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            const percent = Math.round(score / questions.length * 100);
            document.getElementById('final-score').innerText = `Wynik: ${score} / ${questions.length} (${percent}%)`;
            return;
        }
        
        const q = questions[qIndex];
        document.getElementById('q-number').innerText = qIndex + 1;
        document.getElementById('q-text').innerText = q.q;
        
        const fb = document.getElementById('q-feedback');
        fb.style.display = 'none';
        fb.innerText = "";
        
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('quiz-progress').style.width = ((qIndex) / questions.length * 100) + '%';
        
        const grid = document.getElementById('q-options');
        grid.innerHTML = "";
        
        q.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'quiz-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn, q.ans, q.info);
            grid.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn, correct, info) {
        const allBtns = document.querySelectorAll('.quiz-btn');
        allBtns.forEach(b => b.onclick = null);

        const fb = document.getElementById('q-feedback');
        fb.style.display = 'block';

        if(selected === correct) {
            btn.classList.add('correct');
            score++;
            fb.innerHTML = `<span style="color:#2e7d32; font-size:20px;">✅ IDEALNIE!</span><br><br>${info}`;
            fb.style.borderLeftColor = "#4caf50";
        } else {
            btn.classList.add('wrong');
            allBtns[correct].classList.add('correct');
            fb.innerHTML = `<span style="color:#c62828; font-size:20px;">❌ BŁĄD! PRZECZYTAJ WYJAŚNIENIE:</span><br><br>${info}`;
            fb.style.borderLeftColor = "#f44336";
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        qIndex++;
        loadQuestion();
    }

</script>

</body>
</html>
